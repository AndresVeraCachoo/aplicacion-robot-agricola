# Identificación del proyecto
sonar.projectKey=agrirobot-dashboard
sonar.projectName=AgriRobot Dashboard
sonar.projectVersion=1.0.0

# Ubicación del código fuente
sonar.sources=.
# Exclusiones críticas para evitar ruido en el reporte
sonar.exclusions=node_modules/**, dist/**, server/node_modules/**, public/**, **/*.test.js

# Configuración de lenguaje
sonar.javascript.environments=browser,node
sonar.sourceEncoding=UTF-8

# Ruta para reportes de cobertura (si decides añadir tests después)
sonar.javascript.lcov.reportPaths=coverage/lcov.info